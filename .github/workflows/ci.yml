name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Select newest Xcode on runner
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          xcodebuild -version

      - name: Core tests
        run: swift test --package-path SafeClipCore

      - name: Generate project
        run: |
          brew install xcodegen
          xcodegen

      # Zero-warnings build gate (CLAUDE.md working rule) — both channels.
      - name: Build GitHub variant (unsigned)
        run: |
          set -o pipefail
          xcodebuild -project SafeClip.xcodeproj -scheme SafeClip \
            -configuration Debug build \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            | tee build.log
          if grep -E "warning: " build.log | grep -v "appintentsmetadataprocessor"; then
            echo "::error::warnings found — zero-warnings policy"; exit 1
          fi

      - name: Build App Store variant (unsigned, sandboxed)
        run: |
          set -o pipefail
          xcodebuild -project SafeClip.xcodeproj -scheme SafeClip-MAS \
            -configuration Debug build \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            | tee build-mas.log
          if grep -E "warning: " build-mas.log | grep -v "appintentsmetadataprocessor"; then
            echo "::error::warnings found — zero-warnings policy"; exit 1
          fi
